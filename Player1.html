<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vòng Quay Thí Sinh</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-weight: bold !important;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: url('bg.png') no-repeat center center/120% auto;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }

    .app {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .wheel-container {
      position: relative;
      width: 820px;
      height: 820px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #wheel {
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
      filter: drop-shadow(0 0 30px rgba(0, 0, 0, 0.5));
      will-change: transform;
      transform: translateZ(0);
    }

    .pointer-wrapper {
      position: absolute;
      bottom: -80px;
      left: 50%;
      width: 90px;
      height: 90px;
      transform: translateX(-50%);
      z-index: 5;
      pointer-events: none;
      user-select: none;
    }

    .pointer {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform: rotate(180deg);
      transform-origin: center top;
      will-change: transform;
    }

    .drag-zone {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      z-index: 10;
      cursor: not-allowed;
    }

    .audio-init-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .audio-init-overlay button {
      background: #ff00ff;
      color: white;
      border: none;
      padding: 25px 50px;
      font-size: 24px;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 0 25px #39ff14;
    }
    
    .status-badge {
      background: rgba(0,0,0,0.85);
      padding: 14px 28px;
      border-radius: 8px;
      border: 2px solid cyan;
      margin-bottom: 15px;
      font-size: 18px;
      color: yellow;
      text-align: center;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.4/dist/socket.io.min.js"></script>
</head>

<body>

  <div id="audioOverlay" class="audio-init-overlay">
    <button onclick="activateAudioStream()">KÍCH HOẠT KẾT NỐI REALTIME & ÂM THANH</button>
  </div>

  <div class="app">
    <div class="wheel-container">
      <div class="pointer-wrapper">
        <img id="pointerImg" class="pointer" src="pointer.png" />
      </div>
      <img id="wheel" src="wheel-template.png" />
      <div class="drag-zone" id="dragZone"></div>
    </div>
  </div>

  <audio id="spinSound" src="spin.mp3" preload="auto" loop></audio>

  <script>
    // =============================================================
    // LỚP BẢO MẬT: KIỂM TRA CHÉO MÃ PHÒNG VÀ MẬT KHẨU TỪ URL TỐC ĐỘ CAO
    // =============================================================
    const urlParams = new URLSearchParams(window.location.search);
    const roomid = urlParams.get('roomid');
    const password = urlParams.get('password');
    
    // !!! LƯU Ý: Sửa thành "Player 2" hoặc "Player 3" ở các file tương ứng
    const THIS_PLAYER = "Player 1"; 

    if (!roomid || !password || roomid.length !== 6 || isNaN(roomid) || password.length !== 4 || isNaN(password)) {
      // Chặn đứng lập tức, xóa sạch giao diện cũ và hiển thị màn hình thông báo lỗi tùy biến chuyên nghiệp
      document.body.innerHTML = `
  <div style="background: #0c0c0c; color: white; height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; font-family: Arial, sans-serif; position: fixed; top: 0; left: 0; z-index: 99999;">
    <div style="background: #181818; border: 3px solid #ff0000; padding: 40px; border-radius: 16px; text-align: center; box-shadow: 0 0 25px rgba(255,0,0,0.3); width: 440px; box-sizing: border-box;">
      <h2 style="color: #ff0000; margin-bottom: 20px; font-size: 24px; letter-spacing: 1px; font-weight: bold;">TRUY CẬP BỊ CHẶN!</h2>
      <p style="color: #bbb; margin-bottom: 25px; line-height: 1.6; font-size: 16px; font-weight: bold;">Bạn không có quyền truy cập trực tiếp vào giao diện người chơi mà không có mã phòng và mật khẩu hợp lệ.</p>
      <button onclick="window.location.href='index.html'" 
              onmouseover="this.style.backgroundColor='orange'; this.style.color='white';" 
              onmouseout="this.style.backgroundColor='#ff0000'; this.style.color='white';" 
              style="background: #ff0000; color: white; border: none; padding: 14px 25px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: background 0.2s, color 0.2s;">
        QUAY LẠI TRANG ĐĂNG NHẬP
      </button>
    </div>
  </div>
`;
      throw new Error("[BẢO MẬT] Ngăn chặn thực thi Script do thiếu thông tin hoặc sai mật khẩu!");
    }

    // =============================================================
    // LOGIC HỆ THỐNG VÒNG QUAY ĐỒNG BỘ
    // =============================================================
    const socket = io("https://wheel2001.onrender.com");

    const wheel = document.getElementById("wheel");
    const dragZone = document.getElementById("dragZone");
    const spinSound = document.getElementById("spinSound");
    const pointerImg = document.getElementById("pointerImg");
    const audioOverlay = document.getElementById("audioOverlay");
    const statusIndicator = document.getElementById("statusIndicator");

    let baseRotation = 0, initVelocity = 0, spinStartTime = 0, isSpinningFree = false;
    let currentRotation = 0, isDragging = false, lastAngle = 0, isDraggingByMe = false;
    let dragTrack = [];

    const pinAngleStep = 360 / 24;
    const frictionPerMs = Math.pow(0.995, 1 / 16.67);
    const lnFriction = Math.log(frictionPerMs);

    let isSystemActivated = false, isSoundPlaying = false;
    let myTurnToControl = false; 

    function activateAudioStream() {
      isSystemActivated = true;
      audioOverlay.style.display = "none";
      spinSound.volume = 0;
      spinSound.play().catch(e => console.log(e));
      if (roomid) {
        // GỬI KÈM MẬT KHẨU lên máy chủ khi yêu cầu joinRoom để xác thực lớp cuối cùng
        socket.emit('joinRoom', { roomid, player: THIS_PLAYER, password });
      }
    }

    socket.on('initGameState', (state) => {
      if (state) {
        if (state.activeImage && wheel) wheel.src = state.activeImage;
        applyPermissionUI(state.allowedPlayer);
      }
    });

    socket.on('playerUpdateImage', (imageName) => {
      if (imageName && wheel) {
        wheel.src = imageName;
      }
    });

    socket.on('playerSyncPhysics', (data) => {
      if (isDraggingByMe) return;
      parseServerPhysics(data);
    });

    socket.on('syncAllowedPlayer', (player) => {
      applyPermissionUI(player);
    });

    function applyPermissionUI(allowedPlayer) {
      const isMyTurn = (allowedPlayer === myPlayerName);
      
      if (isMyTurn) {
        isDraggingAllowed = true; 
      } else {
        isDraggingAllowed = false;
      }
    }

    function parseServerPhysics(data) {
      if (data.spinStartTime) {
        baseRotation = data.baseRotation || data.rotation || 0;
        initVelocity = data.initVelocity || data.velocity || 0;
        spinStartTime = data.spinStartTime;
        isSpinningFree = true;
        isDragging = false;
      } else {
        currentRotation = data.rotation || 0;
        initVelocity = data.velocity || 0;
        isSpinningFree = false;
        isDragging = !!data.isDraggingSync;
        if (!isDragging && data.velocity === 0) spinStartTime = 0;
      }
    }

    function calculateCurrentPhysics() {
      if (!isSpinningFree) return { r: currentRotation, v: 0 };
      const t = Date.now() - spinStartTime;
      if (t <= 0) return { r: baseRotation, v: initVelocity };

      const currentV = initVelocity * Math.pow(frictionPerMs, t);
      if (Math.abs(currentV) <= 0.04) {
        isSpinningFree = false;
        spinStartTime = 0;
        return { r: currentRotation, v: 0 };
      }

      const deltaRotation = (initVelocity / lnFriction) * (Math.pow(frictionPerMs, t) - 1) * (1 / 16.67);
      return { r: baseRotation + deltaRotation, v: currentV };
    }

    function manageSoundSafelyBackground() {
      if (!isSystemActivated) return;
      let totalVelocityNow = isSpinningFree ? calculateCurrentPhysics().v : (isDragging ? 10 : 0);

      if (totalVelocityNow > 0.04 || isDragging) {
        if (isSpinningFree && spinStartTime > 0) {
          const elapsed = Date.now() - spinStartTime;
          if (elapsed >= 1000) {
            if (!isSoundPlaying) {
              isSoundPlaying = true;
              spinSound.currentTime = 0;
              spinSound.volume = 1;
            }
          } else {
            if (spinSound.volume !== 0) spinSound.volume = 0;
          }
        } else {
          if (spinSound.volume !== 0) spinSound.volume = 0;
        }
      } else {
        if (spinSound.volume !== 0 || isSoundPlaying) {
          spinSound.volume = 0;
          spinSound.currentTime = 0;
          isSoundPlaying = false;
        }
      }
    }
    setInterval(manageSoundSafelyBackground, 30);

    function getAngle(clientX, clientY) {
      const wheelRect = wheel.getBoundingClientRect();
      const centerX = wheelRect.left + wheelRect.width / 2;
      const centerY = wheelRect.top + wheelRect.height / 2;
      let angle = Math.atan2(clientY - centerY, clientX - centerX) * (180 / Math.PI);
      return angle < 0 ? angle + 360 : angle;
    }

    function handleStart(e) {
      if (!isSystemActivated || !myTurnToControl) return;
      let currentV = isSpinningFree ? calculateCurrentPhysics().v : 0;
      if (Math.abs(currentV) > 0.04) return;

      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      isDragging = true;
      isDraggingByMe = true;
      isSpinningFree = false;
      spinStartTime = 0;
      isSoundPlaying = false;

      lastAngle = getAngle(clientX, clientY);
      dragTrack = [{ angle: lastAngle, time: Date.now() }];

      socket.emit('playerMoveWheel', { rotation: currentRotation, velocity: 0, isDraggingSync: true });
    }

    function handleMove(e) {
      if (!isDragging || !isDraggingByMe) return;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      const currentAngle = getAngle(clientX, clientY);
      let deltaAngle = currentAngle - lastAngle;

      if (deltaAngle > 180) deltaAngle -= 360;
      if (deltaAngle < -180) deltaAngle += 360;

      currentRotation += deltaAngle;
      lastAngle = currentAngle;

      const now = Date.now();
      dragTrack.push({ angle: currentAngle, time: now });
      while (dragTrack.length > 0 && now - dragTrack[0].time > 100) dragTrack.shift();

      socket.emit('playerMoveWheel', { rotation: currentRotation, velocity: 0, isDraggingSync: true });
    }

    function handleEnd() {
      if (!isDragging || !isDraggingByMe) return;
      isDragging = false;
      let calculatedVelocity = 0;
      const now = Date.now();

      while (dragTrack.length > 0 && now - dragTrack[0].time > 100) dragTrack.shift();

      if (dragTrack.length >= 2) {
        const first = dragTrack[0];
        const last = dragTrack[dragTrack.length - 1];
        const timeDiff = last.time - first.time;

        if (timeDiff > 0) {
          let totalDelta = 0;
          for (let i = 1; i < dragTrack.length; i++) {
            let diff = dragTrack[i].angle - dragTrack[i - 1].angle;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;
            totalDelta += diff;
          }
          calculatedVelocity = (totalDelta / timeDiff) * 15;
        }
      }

      const maxVel = 25;
      if (calculatedVelocity > maxVel) calculatedVelocity = maxVel;
      if (calculatedVelocity < -maxVel) calculatedVelocity = -maxVel;

      if (Math.abs(calculatedVelocity) > 0.1) {
        baseRotation = currentRotation;
        initVelocity = calculatedVelocity;
        spinStartTime = Date.now();
        isSpinningFree = true;
        isSoundPlaying = false;

        socket.emit('playerMoveWheel', {
          baseRotation: baseRotation,
          initVelocity: initVelocity,
          spinStartTime: spinStartTime
        });
      } else {
        isDraggingByMe = false;
        spinStartTime = 0;
        isSoundPlaying = false;
        socket.emit('playerStopWheel', { rotation: currentRotation });
      }
    }

    dragZone.addEventListener("mousedown", handleStart);
    window.addEventListener("mousemove", handleMove);
    window.addEventListener("mouseup", handleEnd);
    dragZone.addEventListener("touchstart", handleStart, { passive: true });
    window.addEventListener("touchmove", handleMove, { passive: false });
    window.addEventListener("touchend", handleEnd);

    function updatePointerFlap(rotationValue) {
      let normalizedRotation = rotationValue % 360;
      if (normalizedRotation < 0) normalizedRotation += 360;
      let remainder = normalizedRotation % pinAngleStep;
      if (remainder > pinAngleStep / 2) remainder -= pinAngleStep;

      let pointerAngleOffset = 0;
      const contactZone = 6;
      if (Math.abs(remainder) < contactZone) {
        let pushIntensity = (contactZone - Math.abs(remainder)) / contactZone;
        pointerAngleOffset = -Math.abs(remainder * pushIntensity * 6.0);
      }
      pointerAngleOffset = Math.max(-25, Math.min(0, pointerAngleOffset));
      pointerImg.style.transform = `rotate(${180 + pointerAngleOffset}deg)`;
    }

    function renderLoop() {
      const state = calculateCurrentPhysics();
      if (isSpinningFree) currentRotation = state.r;

      wheel.style.transform = `rotate(${currentRotation.toFixed(2)}deg) translateZ(0)`;
      updatePointerFlap(currentRotation);

      if (isDraggingByMe && isSpinningFree === false && state.v === 0 && !isDragging) {
        isDraggingByMe = false;
        spinStartTime = 0;
        isSoundPlaying = false;
        socket.emit('playerStopWheel', { rotation: currentRotation });
      }
      requestAnimationFrame(renderLoop);
    }
    requestAnimationFrame(renderLoop);

    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (e.keyCode === 123) e.preventDefault();
      if ((e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
        e.preventDefault();
      }
    });
</script>
</body>

</html>
