<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Màn Hình Quan Sát Viewer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-weight: bold !important;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: url('bg.png') no-repeat center center/120% auto;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }

    .app {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .wheel-container {
      position: relative;
      width: 820px;
      height: 820px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #wheel {
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
      filter: drop-shadow(0 0 30px rgba(0, 0, 0, 0.5));
      will-change: transform;
      transform: translateZ(0);
    }

    .pointer-wrapper {
      position: absolute;
      bottom: -80px;
      left: 50%;
      width: 90px;
      height: 90px;
      transform: translateX(-50%);
      z-index: 5;
      pointer-events: none;
      user-select: none;
    }

    .pointer {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform: rotate(180deg);
      transform-origin: center top;
      will-change: transform;
    }

    .drag-zone {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      z-index: 10;
      cursor: not-allowed;
    }

    .audio-init-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .audio-init-overlay button {
      background: #ff00ff;
      color: white;
      border: none;
      padding: 25px 50px;
      font-size: 24px;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 0 25px #39ff14;
    }

    .room-header {
      background: rgba(0, 0, 0, 0.8);
      padding: 10px 20px;
      border-radius: 6px;
      border: 1px dashed white;
      margin-bottom: 15px;
      color: #fff;
      font-size: 16px;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.4/dist/socket.io.min.js"></script>
</head>

<body>

  <div id="audioOverlay" class="audio-init-overlay">
    <button onclick="activateViewerRealtime()">KẾT NỐI THEO DÕI REALTIME</button>
  </div>

  <div class="app">
    <div class="wheel-container">
      <div class="pointer-wrapper">
        <img id="pointerImg" class="pointer" src="pointer.png" />
      </div>
      <img id="wheel" src="wheel-template.png" />
      <div class="drag-zone" id="dragZone"></div>
    </div>
  </div>

  <audio id="spinSound" src="spin.mp3" preload="auto" loop></audio>

  <script>
    // Thiết lập kết nối Socket thời gian thực cho màn hình quan sát tổng quát
    const socket = io();

    // 1. TỰ ĐỘNG LẤY MÃ PHÒNG TRỰC TIẾP TỪ URL (?roomid=...) HOẶC SESSIONSTORAGE
    const urlParams = new URLSearchParams(window.location.search);
    let roomid = urlParams.get('roomid');

    if (roomid) {
      // Nếu có roomid trên URL, lưu lại vào sessionStorage để ghi nhớ trạng thái phòng
      sessionStorage.setItem('roomid', roomid);
    } else {
      // Nếu trên URL không có, thử lấy lại phòng cũ đã lưu trong phiên làm việc
      roomid = sessionStorage.getItem('roomid');
    }

    // 2. KIỂM TRA MÃ PHÒNG (Không dùng alert/prompt/confirm)
    if (!roomid) {
      console.error("⚠️ [VIEWER ERROR] Thừa/Thiếu tham số mã phòng! Vui lòng truy cập theo dạng: viewer.html?roomid=TEN_PHONG");

      // Tùy chọn nâng cao: Hiển thị lỗi trực tiếp lên giao diện thay vì alert rác màn hình
      document.addEventListener("DOMContentLoaded", () => {
        const appContainer = document.querySelector('.app');
        if (appContainer) {
          appContainer.innerHTML = `<h2 style="color: red; text-align: center; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; border: 2px solid red;">
        ⚠️ THIẾU MÃ PHÒNG TRÊN URL<br>
        <span style="font-size: 16px; color: #ccc; font-weight: normal;">Vui lòng thêm ?roomid=... vào cuối đường dẫn</span>
      </h2>`;
        }
      });
    } else {
      // Gửi sự kiện tham gia phòng trực tiếp với vai trò là 'viewer'
      socket.emit('joinRoom', { roomid, role: 'viewer' });
    }

    const wheel = document.getElementById('wheel');
    const pointerImg = document.getElementById('pointer');

    // Quản lý kho âm thanh Soundboard cục bộ cho Viewer hiển thị màn hình lớn
    const clickSound = new Audio('click.mp3');
    const soundboard = {
      goc: new Audio('goc.mp3'),
      matluot: new Audio('matluot.mp3'),
      mayman: new Audio('mayman.mp3'),
      nhacnen: new Audio('nhacnen.mp3'),
      chia_doi: new Audio('chia_doi.mp3'),
      nhan_doi: new Audio('nhan_doi.mp3'),
      'vỗ_tay': new Audio('vỗ_tay.mp3')
    };

    // Hàm phát âm thanh soundboard tối ưu bằng Object Mapping
    function playSoundboardEvent(soundName) {
      try {
        const audio = soundboard[soundName];
        if (audio) {
          audio.currentTime = 0;
          audio.play().catch(err => console.warn(`Chưa tương tác với trang, chưa thể tự động phát: ${soundName}`, err));
        }
      } catch (err) {
        console.error("Lỗi phát âm thanh Soundboard:", err);
      }
    }

    // Khai báo biến vật lý vòng quay
    let currentRotation = 0;
    let baseRotation = 0;
    let initVelocity = 0;
    let spinStartTime = 0;
    let isSpinningFree = false;

    const friction = 0.988;
    const pinAngleStep = 15;
    let lastClickAngleIndex = 0;
    let isSoundPlaying = false;

    // Tiếp nhận đồng bộ chuyển động vật lý nón xoay từ phòng thi
    socket.on('playerSyncPhysics', (data) => {
      if (data.spinStartTime) {
        baseRotation = data.baseRotation;
        initVelocity = data.initVelocity;
        spinStartTime = data.spinStartTime;
        isSpinningFree = true;
      } else {
        if (data.rotation !== undefined) currentRotation = data.rotation;
        if (data.velocity === 0) {
          isSpinningFree = false;
          spinStartTime = 0;
          initVelocity = 0;
        }
      }
    });

    // Tính toán toán học vận tốc và góc quay theo thời gian thực (Delta-time)
    function calculateCurrentPhysics() {
      if (!isSpinningFree) return { r: currentRotation, v: 0 };

      const t = (performance.now() - spinStartTime) / 1000;
      if (t < 0) return { r: baseRotation, v: initVelocity };

      const currentVelocity = initVelocity * Math.pow(friction, t * 60);

      if (Math.abs(currentVelocity) < 0.2) {
        isSpinningFree = false;
        const finalRotation = baseRotation + (initVelocity * (1 - Math.pow(friction, t * 60))) / (1 - friction) / 60;
        return { r: finalRotation, v: 0 };
      }

      const computedRotation = baseRotation + (initVelocity * (1 - Math.pow(friction, t * 60))) / (1 - friction) / 60;
      return { r: computedRotation, v: currentVelocity };
    }

    // Phát âm thanh "tạch tạch" khi các chốt của nón đi qua kim (Đã đồng bộ mượt mà theo fps)
    function manageSoundSafelyBackground(activeRotation) {
      let normalizedRotation = activeRotation % 360;
      if (normalizedRotation < 0) normalizedRotation += 360;
      let currentAngleIndex = Math.floor(normalizedRotation / pinAngleStep);

      if (currentAngleIndex !== lastClickAngleIndex) {
        lastClickAngleIndex = currentAngleIndex;
        if (!isSoundPlaying) {
          isSoundPlaying = true;
          clickSound.currentTime = 0;
          clickSound.play()
            .then(() => { isSoundPlaying = false; })
            .catch(() => { isSoundPlaying = false; });
        }
      }
    }

    // Khớp bẻ kim nón xoay sinh động
    function updatePointerFlap(rotationValue) {
      let normalizedRotation = rotationValue % 360;
      if (normalizedRotation < 0) normalizedRotation += 360;
      let remainder = normalizedRotation % pinAngleStep;
      if (remainder > pinAngleStep / 2) remainder -= pinAngleStep;

      let pointerAngleOffset = 0;
      const contactZone = 6;

      if (Math.abs(remainder) < contactZone) {
        let pushIntensity = (contactZone - Math.abs(remainder)) / contactZone;
        pointerAngleOffset = -Math.abs(remainder * pushIntensity * 6.0);
      }

      pointerAngleOffset = Math.max(-25, Math.min(0, pointerAngleOffset));
      pointerImg.style.transform = `rotate(${180 + pointerAngleOffset}deg)`;
    }

    // Vòng lặp Render hình ảnh và tính toán âm thanh 60fps - 144fps
    function renderLoop() {
      const state = calculateCurrentPhysics();
      if (isSpinningFree) currentRotation = state.r;

      // Cập nhật giao diện hình ảnh nón
      wheel.style.transform = `rotate(${currentRotation.toFixed(2)}deg) translateZ(0)`;
      updatePointerFlap(currentRotation);

      // Thực hiện tính toán âm thanh tạch tạch dựa trên góc hiện tại của render công thức vật lý
      manageSoundSafelyBackground(currentRotation);

      requestAnimationFrame(renderLoop);
    }
    requestAnimationFrame(renderLoop);


    // ==========================================
    // ĐỒNG BỘ MẶT NÓN VÀ SOUNDBOARD CHO VIEWER
    // ==========================================

    // Đồng bộ mặt nón trực tuyến từ bàn điều khiển Tech
    socket.on('playerUpdateImage', (imageName) => {
      if (imageName && wheel) {
        wheel.src = imageName;
      }
    });

    // Tiếp nhận lệnh phát âm thanh từ bàn điều khiển Tech
    socket.on('listenSoundboard', (soundName) => {
      if (soundName) {
        playSoundboardEvent(soundName);
      }
    });

    // Nạp cấu hình mặt nón ban đầu ngay lập tức khi vừa kết nối thành công vào phòng
    socket.on('initGameState', (state) => {
      if (state?.activeImage && wheel) {
        wheel.src = state.activeImage;
      }
    });

    // Chặn các tính năng Developer Tools để bảo mật mã nguồn màn hình led lớn
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (e.keyCode === 123) e.preventDefault(); // Chặn F12
      if ((e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
        e.preventDefault(); // Chặn Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
      }
    });
  </script>
</body>

</html>
