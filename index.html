<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <title>Xác Thực Người Chơi</title>
  <style>
    * {
      box-sizing: border-box;
      font-weight: bold !important;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0c0c0c;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: #181818;
      border: 3px solid #39ff14;
      padding: 40px;
      border-radius: 16px;
      width: 440px;
      box-shadow: 0 0 25px rgba(57, 255, 20, 0.25);
      text-align: center;
    }

    h2 {
      color: #39ff14;
      margin-bottom: 25px;
      font-size: 22px;
      text-transform: uppercase;
    }

    .form-item {
      margin-bottom: 18px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: #bbb;
      font-size: 14px;
    }

    select, input {
      width: 100%;
      padding: 12px;
      background: #262626;
      border: 1px solid #444;
      color: white;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
    }

    select:focus, input:focus {
      border-color: #39ff14;
    }

    .btn-submit {
      width: 100%;
      background: #39ff14;
      color: black;
      border: none;
      padding: 14px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s;
      margin-top: 10px;
    }

    .btn-submit:active {
      transform: scale(0.97);
    }

    .btn-submit:hover {
      background: orange;
      color: white;
    }

    .popup-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .popup-content {
      background: #222;
      border: 3px solid #ff0000;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      width: 380px;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
    }

    .popup-content p {
      font-size: 16px;
      color: white;
      margin-bottom: 22px;
      line-height: 1.5;
    }

    .popup-content button {
      background: #ff0000;
      color: white;
      border: none;
      padding: 10px 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
    }

    .popup-content button:hover {
      background: orange;
      color: white;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.4/dist/socket.io.min.js"></script>
</head>

<body>

  <div class="login-box">
    <h2>XÁC THỰC NGƯỜI CHƠI</h2>
    <div class="form-item">
      <label>Chọn Người Chơi:</label>
      <select id="playerSelect">
        <option value="Player 1">Player 1</option>
        <option value="Player 2">Player 2</option>
        <option value="Player 3">Player 3</option>
      </select>
    </div>
    <div class="form-item">
      <label>Mã Phòng (6 chữ số):</label>
      <input type="text" id="roomIdInput" maxlength="6" placeholder="Nhập mã phòng...">
    </div>
    <div class="form-item">
      <label>Mật Khẩu (4 chữ số):</label>
      <input type="password" id="passwordInput" maxlength="4" placeholder="Nhập mật khẩu...">
    </div>
    <button class="btn-submit" onclick="executeLoginVerify()">XÁC NHẬN ĐĂNG NHẬP</button>
    <button class="btn-submit" style="background: #666; margin-top: 8px;" onclick="debugCheckRooms()">🔍 KIỂM TRA SERVER</button>
  </div>

  <div id="customAlert" class="popup-modal">
    <div class="popup-content">
      <p id="alertMessage">Thông báo lỗi hệ thống!</p>
      <button onclick="closeAlertPopup()">ĐÓNG THÔNG BÁO</button>
    </div>
  </div>

  <script>
    const socket = io("https://wheel2001.onrender.com", {
      reconnection: true,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
      reconnectionAttempts: 5,
      transports: ['websocket', 'polling']
    });

    function showAlertPopup(msg) {
      document.getElementById('alertMessage').innerText = msg;
      document.getElementById('customAlert').style.display = 'flex';
    }
    function closeAlertPopup() {
      document.getElementById('customAlert').style.display = 'none';
    }

    let loginAttempt = 0;

    function executeLoginVerify() {
      const player = document.getElementById('playerSelect').value;
      const roomid = document.getElementById('roomIdInput').value.trim();
      const password = document.getElementById('passwordInput').value.trim();

      if (roomid.length !== 6 || isNaN(roomid)) {
        showAlertPopup("Mã phòng không hợp lệ! Vui lòng nhập đúng 6 chữ số.");
        return;
      }
      if (password.length !== 4 || isNaN(password)) {
        showAlertPopup("Mật khẩu không hợp lệ! Vui lòng nhập đúng 4 chữ số.");
        return;
      }

      console.log('[LOGIN] Trạng thái kết nối:', socket.connected);
      console.log('[LOGIN] Gửi xác thực:', { roomid, player, password });
      
      if (!socket.connected) {
        showAlertPopup("Đang kết nối lại tới máy chủ... Vui lòng thử lại trong 2 giây.");
        socket.connect();
        setTimeout(executeLoginVerify, 2000);
        return;
      }

      loginAttempt++;
      
      // Thêm timeout dài hơn cho phép server xử lý
      const timeoutId = setTimeout(() => {
        showAlertPopup("Máy chủ không phản hồi. Vui lòng kiểm tra kết nối và thử lại!");
        console.error('[LOGIN] TIMEOUT - Không nhận được response từ server sau 10 giây');
        loginAttempt = 0;
      }, 10000);

      socket.emit('verifyLogin', { roomid, player, password }, (response) => {
        clearTimeout(timeoutId);
        console.log('[LOGIN] Server phản hồi:', response);
        loginAttempt = 0;
        
        if (response && response.success) {
          let fileMap = { 
            "Player 1": "Player1.html", 
            "Player 2": "Player2.html", 
            "Player 3": "Player3.html" 
          };
          console.log('[LOGIN] ✓ Đăng nhập thành công! Chuyển hướng tới:', fileMap[player]);
          window.location.href = `${fileMap[player]}?roomid=${roomid}`;
        } else {
          const errorMsg = response && response.msg ? response.msg : "Xác thực không thành công!";
          console.error('[LOGIN] ✗ Lỗi:', errorMsg);
          showAlertPopup(errorMsg);
        }
      });
    }

    socket.on('connect', () => {
      console.log('[SOCKET] ✓ Kết nối thành công! Socket ID:', socket.id);
      document.title = '✓ Xác Thực Người Chơi';
    });

    socket.on('disconnect', () => {
      console.warn('[SOCKET] ✗ Mất kết nối từ máy chủ!');
      document.title = '✗ Xác Thực Người Chơi';
    });

    socket.on('connect_error', (error) => {
      console.error('[SOCKET] Lỗi kết nối:', error.message);
    });

    function debugCheckRooms() {
      if (!socket.connected) {
        alert('Không kết nối được tới server!');
        return;
      }
      console.log('[DEBUG] Kiểm tra tất cả phòng lưu trên server...');
      socket.emit('debugGetAllRooms', (data) => {
        console.log('[DEBUG] Phòng từ server:', data);
        const roomCount = Object.keys(data).length;
        if (roomCount === 0) {
          alert('❌ Không có phòng nào! Bạn cần mở tech.html và bấm "KÍCH HOẠT KHỞI TẠO PHÒNG TỰ ĐỘNG"');
        } else {
          let msg = `✓ Tìm thấy ${roomCount} phòng:\n\n`;
          for (let roomid in data) {
            msg += `Phòng: ${roomid}\n`;
            msg += `  Player 1: ${data[roomid]["Player 1"]}\n`;
            msg += `  Player 2: ${data[roomid]["Player 2"]}\n`;
            msg += `  Player 3: ${data[roomid]["Player 3"]}\n\n`;
          }
          alert(msg);
        }
      });
    }
  </script>
</body>

</html>
