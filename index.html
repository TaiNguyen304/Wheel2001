<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <title>Xác Thực Người Chơi</title>
  <style>
    * {
      box-sizing: border-box;
      font-weight: bold !important;
      font-family: Arial, sans-serif;
    }

    body {
      background: purple;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: #181818;
      border: 3px solid red;
      padding: 40px;
      border-radius: 16px;
      width: 440px;
      box-shadow: 0 0 25px rgba(57, 255, 20, 0.25);
      text-align: center;
    }

    h2 {
      color: yellow;
      margin-bottom: 25px;
      font-size: 22px;
      text-transform: uppercase;
    }

    .form-item {
      margin-bottom: 18px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: #bbb;
      font-size: 14px;
    }

    select,
    input {
      width: 100%;
      padding: 12px;
      background: #262626;
      border: 1px solid #444;
      color: white;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
    }

    select:focus,
    input:focus {
      border-color: #39ff14;
    }

    .btn-submit {
      width: 100%;
      background: green;
      color: white;
      border: none;
      padding: 14px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s;
      margin-top: 10px;
    }

    .btn-submit:active {
      transform: scale(0.97);
    }

    .btn-submit:hover {
      background: orange !important;
      color: white !important;
    }

    .popup-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .popup-content {
      background: #222;
      border: 3px solid #ff0000;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      width: 420px;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
    }

    /* Đổi màu viền pop-up thông tin/debug thành màu xanh cho thân thiện */
    .popup-modal.info .popup-content {
      border-color: #39ff14;
      box-shadow: 0 0 20px rgba(57, 255, 20, 0.4);
    }

    .popup-content p {
      font-size: 16px;
      color: white;
      margin-bottom: 22px;
      line-height: 1.5;
      text-align: left;
      white-space: pre-line;
    }

    .popup-content button {
      background: #ff0000;
      color: white;
      border: none;
      padding: 10px 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      width: 100%;
    }

    .popup-modal.info .popup-content button {
      background: #39ff14;
      color: black;
    }

    .popup-content button:hover {
      background: orange;
      color: white;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.4/dist/socket.io.min.js"></script>
</head>

<body>

  <div class="login-box">
    <h2>XÁC THỰC NGƯỜI CHƠI</h2>
    <div class="form-item">
      <label>Chọn Người Chơi:</label>
      <select id="playerSelect">
        <option value="Player 1">Player 1</option>
        <option value="Player 2">Player 2</option>
        <option value="Player 3">Player 3</option>
      </select>
    </div>
    <div class="form-item">
      <label>Mã Phòng (6 chữ số):</label>
      <input type="text" id="roomIdInput" maxlength="6" placeholder="Nhập mã phòng...">
    </div>
    <div class="form-item">
      <label>Mật Khẩu (4 chữ số):</label>
      <input type="password" id="passwordInput" maxlength="4" placeholder="Nhập mật khẩu...">
    </div>
    <button class="btn-submit" onclick="executeLoginVerify()">XÁC NHẬN ĐĂNG NHẬP</button>
    <button class="btn-submit" style="background: blue; margin-top: 8px;" onclick="debugCheckRooms()">🔍 KIỂM TRA
      SERVER</button>
  </div>

  <div id="customAlert" class="popup-modal">
    <div class="popup-content">
      <p id="alertMessage">Thông báo hệ thống!</p>
      <button id="alertBtn" onclick="closeAlertPopup()">ĐÓNG THÔNG BÁO</button>
    </div>
  </div>

  <script>
    // Khởi tạo kết nối Socket.io tới máy chủ địa phương (hoặc cùng host)
    const socket = io(window.location.protocol + '//' + window.location.hostname + ':' + window.location.port);

    // Hàm hiển thị Popup tùy biến
    // isInfo = true: viền xanh lá, nút xanh lá (dành cho thành công, danh sách phòng)
    // isInfo = false: viền đỏ, nút đỏ (dành cho lỗi nhập liệu, sai mật khẩu)
    function showAlertPopup(message, isInfo = false) {
      const modal = document.getElementById('customAlert');
      const msgParagraph = document.getElementById('alertMessage');

      msgParagraph.innerText = message;

      if (isInfo) {
        modal.classList.add('info');
      } else {
        modal.classList.remove('info');
      }

      modal.style.display = 'flex';
    }

    // Hàm đóng Popup
    function closeAlertPopup() {
      document.getElementById('customAlert').style.display = 'none';
    }

    // Xử lý logic đăng nhập gửi lên server
    function executeLoginVerify() {
      const playerRole = document.getElementById('playerSelect').value;
      const roomid = document.getElementById('roomIdInput').value.trim();
      const password = document.getElementById('passwordInput').value.trim();

      // Kiểm tra định dạng đầu vào trực tiếp tại Client
      if (roomid.length !== 6 || isNaN(roomid)) {
        showAlertPopup('❌ Mã phòng phải nhập đủ 6 chữ số!', false);
        return;
      }
      if (password.length !== 4 || isNaN(password)) {
        showAlertPopup('❌ Mật khẩu phải nhập đủ 4 chữ số!', false);
        return;
      }

      console.log('[SOCKET] Đang gửi yêu cầu xác thực:', { roomid, playerRole, password });

      // Gửi sự kiện kiểm tra thông tin lên server
      socket.emit('playerVerifyLogin', { roomid, playerRole, password }, (response) => {
        if (response.success) {
          // Nếu thành công, lưu trữ thông tin tạm thời vào sessionStorage để trang Player đọc dữ liệu
          sessionStorage.setItem('authenticatedRoomID', roomid);
          sessionStorage.setItem('authenticatedRole', playerRole);

          // Chuyển hướng trực tiếp đến trang của Player tương ứng (ví dụ: Player1.html)
          const targetPage = playerRole.replace(' ', '') + '.html';
          window.location.href = targetPage;
        } else {
          // Hiển thị lỗi từ server trả về (phòng không tồn tại, sai mật khẩu, hoặc vai chơi đã có người đăng nhập)
          showAlertPopup('❌ Thất bại: ' + response.message, false);
        }
      });
    }

    // Hàm Debug kiểm tra toàn bộ danh sách phòng trực tuyến trên Server
    function debugCheckRooms() {
      if (!socket.connected) {
        showAlertPopup('Không kết nối được tới server!', false);
        return;
      }
      console.log('[DEBUG] Kiểm tra tất cả phòng lưu trên server...');

      socket.emit('debugGetAllRooms', (data) => {
        console.log('[DEBUG] Dữ liệu phòng từ server trả về:', data);

        if (!data || Object.keys(data).length === 0) {
          showAlertPopup('❌ Không có phòng nào đang chạy trên máy chủ!', false);
          return;
        }

        const roomCount = Object.keys(data).length;
        let msg = `✓ Tìm thấy ${roomCount} phòng đang mở:\n\n`;

        for (let id in data) {
          // Đảm bảo dữ liệu phòng tồn tại để không bị lỗi undefined
          const roomPasswords = data[id] || {};

          msg += `Mã Phòng: ${id}\n`;
          msg += `  • Player 1: ${roomPasswords["Player 1"] ? "🔒 Đã đặt MK" : "Trống"}\n`;
          msg += `  • Player 2: ${roomPasswords["Player 2"] ? "🔒 Đã đặt MK" : "Trống"}\n`;
          msg += `  • Player 3: ${roomPasswords["Player 3"] ? "🔒 Đã đặt MK" : "Trống"}\n\n`;
        }

        showAlertPopup(msg, true); // Hiển thị màu xanh lá (thành công)
      });
    }

    // Lắng nghe sự kiện kết nối thành công/thất bại để ghi log debug
    socket.on('connect', () => {
      console.log('[SOCKET] Kết nối máy chủ thành công. ID:', socket.id);
    });

    socket.on('connect_error', (error) => {
      console.error('[SOCKET] Lỗi kết nối tới máy chủ:', error.message);
    });

    // Chặn chuột phải và phím tắt F12 / Developer Tools để đồng bộ trải nghiệm các máy trạm
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (e.keyCode === 123) e.preventDefault(); // Chặn F12
      if ((e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
        e.preventDefault(); // Chặn Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
      }
    });
  </script>
</body>

</html>
