<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player 3</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-weight: bold !important;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: url('bg.png') no-repeat center center/120% auto;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }

    /* Đặt vị trí tương đối cho app để làm gốc tọa độ cho bảng điều khiển */
    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Đổi sang absolute để cố định bên trái, không đẩy lệch vòng quay ở trung tâm */
    .control-panel {
      position: absolute;
      left: 40px;
      top: 50%;
      transform: translateY(-50%);
      background-color: #000000;
      border: 3px solid #ff00cc;
      border-radius: 12px;
      padding: 25px;
      width: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      box-shadow: 0 0 20px rgba(255, 0, 204, 0.4);
      z-index: 20;
      /* Đảm bảo nằm trên nền */
    }

    .panel-label {
      font-size: 16px;
      color: #ffffff;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .time-input {
      width: 100%;
      background: white;
      border: 2px solid #ff00cc;
      border-radius: 6px;
      color: green;
      padding: 10px;
      text-align: center;
      font-size: 20px;
      outline: none;
    }

    /* Nút quay quy định cho Player 1 */
    .btn-spin {
      width: 100%;
      padding: 15px;
      font-size: 22px;
      border: none;
      border-radius: 8px;
      cursor: not-allowed;
      text-transform: uppercase;
      transition: all 0.2s ease;

      /* Trạng thái Khóa mặc định */
      background-color: #000000;
      color: #ffffff;
      border: 2px solid #555555;
    }

    /* Trạng thái Mở khi có quyền */
    .btn-spin.active {
      cursor: pointer;
      background-color: #0000ff;
      /* Xanh da trời 0000ff */
      color: #ffffff;
      /* Chữ đậm trắng */
      border: 2px solid #0000ff;
      box-shadow: 0 0 15px rgba(0, 0, 255, 0.6);
    }

    /* Trạng thái Hover khi có quyền */
    .btn-spin.active:hover {
      background-color: #ffa500;
      /* Màu cam ffa500 */
      color: #ffffff;
      /* Chữ đậm trắng */
      border: 2px solid #ffa500;
      box-shadow: 0 0 25px #ffa500;
    }

    /* Vòng quay luôn giữ vị trí chính giữa màn hình tuyệt đối */
    .wheel-container {
      position: relative;
      width: 820px;
      height: 820px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .wheel-rotator {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      will-change: transform;
      transform: translateZ(0);
    }

    #wheel {
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
      filter: drop-shadow(0 0 30px rgba(0, 0, 0, 0.5));
    }

    .pointer-wrapper {
      position: absolute;
      bottom: -80px;
      left: 50%;
      width: 90px;
      height: 90px;
      transform: translateX(-50%);
      z-index: 15;
      pointer-events: none;
      user-select: none;
    }

    .pointer {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform: rotate(180deg);
      transform-origin: center top;
      will-change: transform;
    }

    .drag-zone {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      z-index: 12;
      cursor: not-allowed;
    }

    .audio-init-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .audio-init-overlay button {
      background: #ff00ff;
      color: white;
      border: none;
      padding: 25px 50px;
      font-size: 24px;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 0 25px #39ff14;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.4/dist/socket.io.min.js"></script>
</head>

<body>

  <div id="audioOverlay" class="audio-init-overlay">
    <button onclick="activateAudioStream()">KÍCH HOẠT KẾT NỐI REALTIME & ÂM THANH</button>
  </div>

  <div class="app">
    <div class="control-panel">
      <div class="panel-label">Thời gian quay (15s - 25s)</div>
      <input type="number" id="spinDurationInput" class="time-input" min="15" max="25" value="20"
        onchange="validateSpinDuration(this)">
      <button id="spinBtn" class="btn-spin" onclick="executeTriggerSpinButton()">QUAY</button>
    </div>

    <div class="wheel-container">
      <div class="all-pointers-container"
        style="position: absolute; top: 50%; left: 50%; z-index: 15; pointer-events: none;">
        <div id="pointer1"
          style="position: absolute; transform: translate(-50%, -50%) rotate(180deg) translateY(-355px);">
          <img src="pointer.png" style="width: 90px; height: 90px; object-fit: contain;" />
        </div>
        <div id="pointer2"
          style="position: absolute; transform: translate(-50%, -50%) rotate(0deg) translateY(-355px);">
          <img src="pointer2.png" style="width: 90px; height: 90px; object-fit: contain;" />
        </div>
        <div id="pointer3"
          style="position: absolute; transform: translate(-50%, -50%) rotate(-30deg) translateY(-355px);">
          <img src="pointer1.png" style="width: 90px; height: 90px; object-fit: contain;" />
        </div>
        <div id="pointer4"
          style="position: absolute; transform: translate(-50%, -50%) rotate(30deg) translateY(-355px);">
          <img src="pointer3.png" style="width: 90px; height: 90px; object-fit: contain;" />
        </div>
      </div>

      <div id="wheel-rotator" class="wheel-rotator">
        <img id="wheel" src="wheel-template.png" />
        <div id="slots-container"
          style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></div>
        <svg id="dotsSvg" viewBox="0 0 820 820"
          style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; z-index: 11;"></svg>
      </div>

      <div class="drag-zone" id="dragZone"></div>
    </div>
  </div>

  <script>
    const socket = io("https://wheel2001.onrender.com", { transports: ['websocket'] });

    const roomid = sessionStorage.getItem('roomid');
    const playerRole = sessionStorage.getItem('player');
    const playerPass = sessionStorage.getItem('password');

    const myPlayerName = "Player 3"; // CHÚ Ý: Đổi thành "Player 2" hoặc "Player 3" tương ứng với từng file
    let isDraggingAllowed = false;
    let currentAllowedPlayer = ""; // Biến lưu trữ người chơi đang có quyền thực tế từ Tech

    // Khai báo danh sách ảnh mặc định của các kim để fallback khi cần
    const defaultPointerImages = {
      p2: 'pointer2.png',
      p3: 'pointer1.png',
      p4: 'pointer3.png'
    };
    
    // --- CƠ CHẾ ĐỒNG BỘ ĐỒNG HỒ ĐỊA LÝ TOÀN CẦU ---
    let serverTimeOffset = 0;
    function syncClockWithServer() {
      const start = Date.now();
      socket.emit('serverTimeSync', start, (data) => {
        if (data) {
          const end = Date.now();
          const latency = (end - start) / 2;
          serverTimeOffset = data.serverTimestamp - (data.clientTimestamp + latency);
        }
      });
    }
    setInterval(syncClockWithServer, 10000);

    function getServerTime() {
      return Date.now() + serverTimeOffset;
    }

    // --- KHỞI TẠO WEB WORKER CHẠY NGẦM ---
    const physicsWorker = new Worker('worker.js');

    physicsWorker.onmessage = function (e) {
      if (e.data.type === 'TICK') {
        physicsWorker.postMessage({
          type: 'TICK_RESPONSE',
          serverNow: getServerTime()
        });
      }
      else if (e.data.type === 'PHYSICS_UPDATE') {
        currentRotation = e.data.rotation;
        isSpinningFree = e.data.isSpinningFree;

        // Cập nhật trạng thái nút bấm dựa trên việc nón có đang quay tự do hay không
        refreshSpinButtonUI();

        if (e.data.triggerClick && !isSoundPlaying) {
          isSoundPlaying = true;
          clickSound.currentTime = 0;
          clickSound.play().then(() => { isSoundPlaying = false; }).catch(() => { isSoundPlaying = false; });
        }

        if (isDraggingByMe && !isSpinningFree && e.data.velocity === 0 && !isDragging) {
          isDraggingByMe = false;
          spinStartTime = 0;
          stopSpinSoundSafely();
          socket.emit('playerStopWheel', { rotation: currentRotation });
        }
      }
    };

    socket.on('connect', () => {
      syncClockWithServer();
      if (roomid && playerRole) {
        socket.emit('playerVerifyLogin', { roomid, playerRole, password: playerPass }, (res) => {
          if (!res || !res.success) {
            window.location.href = 'index.html';
          }
        });
      }
    });

    const wheel = document.getElementById('wheel');
    const wheelRotator = document.getElementById('wheel-rotator');
    const pointerImg = document.getElementById('pointerImg');
    const dotsSvg = document.getElementById('dotsSvg');

    // Khởi tạo 48 chấm tròn màu oải hương (#E6E6FA) cách nhau 7.5 độ, bán kính 398px sát rìa nón
    if (dotsSvg) {
      const cx = 410;
      const cy = 410;
      const r = 355;
      for (let i = 0; i < 48; i++) {
        const angleRad = (i * 7.5) * Math.PI / 180;
        const x = cx + r * Math.cos(angleRad);
        const y = cy + r * Math.sin(angleRad);

        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", x);
        circle.setAttribute("cy", y);
        circle.setAttribute("r", "5");
        circle.setAttribute("fill", "#E6E6FA");
        dotsSvg.appendChild(circle);
      }
    }

    const clickSound = new Audio('click.mp3');
    const spinSound = new Audio('spin.mp3');
    spinSound.loop = false;

    const soundboard = {
      "10s": new Audio('10s.mp3'),
      "30s": new Audio('30s.mp3'),
      "Bankrupt": new Audio('Bankrupt.mp3'),
      "Commercial": new Audio('Commercial.mp3'),
      "Double": new Audio('Double.mp3'),
      "FreeTurn": new Audio('FreeTurn.mp3'),
      "Half": new Audio('Half.mp3'),
      "HostEntrance": new Audio('HostEntrance.mp3'),
      "Intro": new Audio('Intro.mp3'),
      "LoseATurn": new Audio('LoseATurn.mp3'),
      "Lucky": new Audio('Lucky.mp3')
    };

    soundboard["10s"].volume = 0.3;
    soundboard["30s"].volume = 0.3;

    // --- HÀM TỰ ĐỘNG CROP VÀ BO TRÒN THEO MẶT NÓN ---
    function applyWheelCropStyle(imageName) {
      if (!wheel) return;
      if (!imageName) {
        wheel.style.objectFit = "contain";
        wheel.style.borderRadius = "0%";
        wheel.style.width = "100%";
        wheel.style.height = "100%";
        wheel.style.border = "none";
        wheel.style.backgroundColor = "transparent";
        wheel.style.clipPath = "none";
        wheel.style.boxShadow = "none";
        return;
      }

      // Tìm số thứ tự vòng nằm sau chữ 'vong' trong chuỗi
      const match = imageName.match(/vong(\d+)/i);
      if (match) {
        const roundNumber = parseInt(match[1], 10);
        if (roundNumber >= 7 && roundNumber <= 23) {
          // 1. Phục hồi 100% hình ảnh mặt Nón, KHÔNG cắt xén, giữ chuẩn 90% kích thước
          wheel.style.objectFit = "cover";
          wheel.style.width = "90%";
          wheel.style.height = "90%";

          // 2. Bo tròn khung chứa ảnh
          wheel.style.borderRadius = "50%";

          // 3. MẤU CHỐT GIẢI QUYẾT: Đổ màu nền trùng màu viền.
          // Màu này sẽ lấp đầy toàn bộ phần rìa trong suốt của file PNG, kết nối hoàn hảo nón và viền!
          wheel.style.backgroundColor = "#5898d5";

          // 4. Tạo độ dày cho viền. 
          // (Lưu ý: CSS border không nhận giá trị %, nên mình để mặc định 15px. Bạn có thể tăng giảm số 15px - 20px này để tương đương với độ dày 5% mà bạn muốn nhé).
          wheel.style.border = "0px solid #5898d5";

          // Xóa toàn bộ các hiệu ứng cũ gây lỗi mất góc ảnh
          wheel.style.clipPath = "none";
          wheel.style.boxShadow = "none";
          return;
        }
      }

      // Các mặt nón khác giữ nguyên mặc định
      wheel.style.objectFit = "contain";
      wheel.style.borderRadius = "0%";
      wheel.style.width = "100%";
      wheel.style.height = "100%";
      wheel.style.border = "none";
      wheel.style.backgroundColor = "transparent";
      wheel.style.clipPath = "none";
      wheel.style.boxShadow = "none";
    }

    function activateAudioStream() {
      document.getElementById('audioOverlay').style.display = 'none';
      clickSound.play().then(() => { clickSound.pause(); }).catch(() => { });
      spinSound.play().then(() => { spinSound.pause(); }).catch(() => { });
      for (let key in soundboard) {
        soundboard[key].play().then(() => { soundboard[key].pause(); }).catch(() => { });
      }
    }

    function playSoundboardEvent(soundName) {
      if (soundboard[soundName]) {
        try {
          soundboard[soundName].currentTime = 0;
          soundboard[soundName].play();
        } catch (err) { }
      }
    }

    let currentRotation = 0;
    let isDragging = false;
    let startAngle = 0;
    let currentAngle = 0;
    let dragHistory = [];
    let isDraggingByMe = false;

    let baseRotation = 0;
    let initVelocity = 0;
    let spinStartTime = 0;
    let isSpinningFree = false;

    let spinTimeoutToken = null;
    let isSpinSoundPlaying = false;
    const pinAngleStep = 15;
    let isSoundPlaying = false;
    let targetSeconds = 20;

    function getMouseAngle(e) {
      const rect = wheel.getBoundingClientRect();
      const wheelX = rect.left + rect.width / 2;
      const wheelY = rect.top + rect.height / 2;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return Math.atan2(clientY - wheelY, clientX - wheelX) * (180 / Math.PI);
    }

    // Hàm quản lý UI độc lập cho nút bấm và drag-zone
    function refreshSpinButtonUI() {
      const spinBtn = document.getElementById('spinBtn');
      if (!spinBtn) return;

      // Nếu nón đang quay -> Khóa nút ngay lập tức
      if (isSpinningFree) {
        spinBtn.classList.remove('active');
        spinBtn.disabled = true;
      } else {
        // Nếu nón dừng -> Xét quyền được cấp từ bộ điều khiển
        if (currentAllowedPlayer === myPlayerName) {
          spinBtn.classList.add('active');
          spinBtn.disabled = false;
        } else {
          spinBtn.classList.remove('active');
          spinBtn.disabled = true;
        }
      }
    }

    function applyPermissionUI(allowedPlayer) {
      currentAllowedPlayer = allowedPlayer; // Lưu lại trạng thái quyền toàn cục
      const dragZone = document.getElementById('dragZone');

      if (allowedPlayer === myPlayerName) {
        isDraggingAllowed = true;
        if (dragZone) dragZone.style.cursor = 'grab';
      } else {
        isDraggingAllowed = false;
        if (dragZone) dragZone.style.cursor = 'not-allowed';
      }

      refreshSpinButtonUI();
    }

    function onMouseDown(e) {
      if (!isDraggingAllowed || isSpinningFree) return;
      isDragging = true;
      isDraggingByMe = true;
      startAngle = getMouseAngle(e);
      currentAngle = startAngle;
      dragHistory = [{ angle: startAngle, time: performance.now() }];
      spinStartTime = 0;
      initVelocity = 0;

      physicsWorker.postMessage({ type: 'SYNC_STATIC', rotation: currentRotation });

      socket.emit('playerUpdatePhysics', {
        rotation: currentRotation,
        velocity: 0,
        isDraggingSync: true
      });
    }

    function onMouseMove(e) {
      if (!isDragging || !isDraggingByMe) return;
      const mouseAngle = getMouseAngle(e);
      const delta = mouseAngle - currentAngle;
      currentAngle = mouseAngle;

      let adjustedDelta = delta;
      if (delta > 180) adjustedDelta -= 360;
      if (delta < -180) adjustedDelta += 360;

      currentRotation += adjustedDelta;
      dragHistory.push({ angle: mouseAngle, time: performance.now() });
      if (dragHistory.length > 5) dragHistory.shift();

      physicsWorker.postMessage({ type: 'SYNC_STATIC', rotation: currentRotation });

      socket.emit('playerUpdatePhysics', {
        rotation: currentRotation,
        velocity: 0,
        isDraggingSync: true
      });
    }

    function onMouseUp() {
      if (!isDragging || !isDraggingByMe) return;
      isDragging = false;

      if (dragHistory.length < 2) {
        isDraggingByMe = false;
        socket.emit('playerUpdatePhysics', { rotation: currentRotation, velocity: 0, isDraggingSync: false });
        return;
      }

      const now = performance.now();
      let validSample = null;
      for (let i = dragHistory.length - 1; i >= 0; i--) {
        if (now - dragHistory[i].time > 10 && now - dragHistory[i].time < 150) {
          validSample = dragHistory[i];
          break;
        }
      }
      if (!validSample) validSample = dragHistory[0];

      const dt = (now - validSample.time) / 1000;
      if (dt <= 0) {
        isDraggingByMe = false;
        socket.emit('playerUpdatePhysics', { rotation: currentRotation, velocity: 0, isDraggingSync: false });
        return;
      }

      let deltaAngle = currentAngle - validSample.angle;
      if (deltaAngle > 180) deltaAngle -= 360;
      if (deltaAngle < -180) deltaAngle += 360;

      let calculatedVelocity = deltaAngle / dt;
      const maxVel = 2500;
      if (calculatedVelocity > maxVel) calculatedVelocity = maxVel;
      if (calculatedVelocity < -maxVel) calculatedVelocity = -maxVel;

      if (Math.abs(calculatedVelocity) > 40) {
        baseRotation = currentRotation;
        initVelocity = calculatedVelocity;
        spinStartTime = getServerTime();
        isSpinningFree = true;

        triggerSpinSoundTimeout();
        refreshSpinButtonUI();

        physicsWorker.postMessage({
          type: 'START_PHYSICS',
          baseRotation: baseRotation,
          initVelocity: initVelocity,
          spinStartTime: spinStartTime
        });

        socket.emit('playerUpdatePhysics', {
          baseRotation: baseRotation,
          initVelocity: initVelocity,
          spinStartTime: spinStartTime
        });
      } else {
        isDraggingByMe = false;
        socket.emit('playerUpdatePhysics', { rotation: currentRotation, velocity: 0, isDraggingSync: false });
      }
    }

    function triggerSpinSoundTimeout() {
      clearTimeout(spinTimeoutToken);
      spinTimeoutToken = setTimeout(() => {
        if (isSpinningFree && !isSpinSoundPlaying) {
          try {
            spinSound.currentTime = 0;
            spinSound.play();
            isSpinSoundPlaying = true;
          } catch (e) { }
        }
      }, 1000);
    }

    function stopSpinSoundSafely() {
      clearTimeout(spinTimeoutToken);
      if (isSpinSoundPlaying) {
        spinSound.pause();
        spinSound.currentTime = 0;
        isSpinSoundPlaying = false;
      }
    }

    window.addEventListener('mousedown', onMouseDown);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    window.addEventListener('touchstart', onMouseDown, { passive: false });
    window.addEventListener('touchmove', onMouseMove, { passive: false });
    window.addEventListener('touchend', onMouseUp);

    socket.on('playerSyncPhysics', (data) => {
      if (isDraggingByMe) return; // Nếu là chính mình đang quay/kéo thì không ghi đè

      if (data.spinStartTime && data.spinStartTime > 0) {
        baseRotation = data.baseRotation;
        initVelocity = data.initVelocity;

        // SỬA TẠI ĐÂY: Đồng bộ tương đối dựa theo thời gian máy local tiếp nhận gói tin
        spinStartTime = getServerTime();

        isSpinningFree = true;

        if (data.targetSeconds) {
          targetSeconds = data.targetSeconds;
          const durationInput = document.getElementById('spinDurationInput');
          if (durationInput) durationInput.value = data.targetSeconds;
        }

        triggerSpinSoundTimeout();
        refreshSpinButtonUI();

        physicsWorker.postMessage({
          type: 'START_PHYSICS',
          baseRotation: baseRotation,
          initVelocity: initVelocity,
          spinStartTime: spinStartTime
        });
      } else {
        if (data.rotation !== undefined) {
          currentRotation = data.rotation;
          physicsWorker.postMessage({ type: 'SYNC_STATIC', rotation: currentRotation });
        }
        if (data.velocity === 0) {
          isSpinningFree = false;
          spinStartTime = 0;
          initVelocity = 0;
          stopSpinSoundSafely();
          refreshSpinButtonUI();
        }
      }
    });

    // Khoá góc kim cố định hướng thẳng vào tâm
    function updatePointerFlap(rotationValue) {
      if (pointerImg) pointerImg.style.transform = `rotate(180deg)`;
    }

    function renderLoop() {
      if (wheelRotator) wheelRotator.style.transform = `rotate(${currentRotation.toFixed(2)}deg) translateZ(0)`;
      updatePointerFlap(currentRotation);
      requestAnimationFrame(renderLoop);
    }
    requestAnimationFrame(renderLoop);

    // CHỈNH SỬA TẠI ĐÂY: Áp dụng crop khi nhận lệnh thay đổi ảnh
    socket.on('playerUpdateImage', (imageName) => {
      if (imageName && wheel) {
        wheel.src = imageName;
        applyWheelCropStyle(imageName);
      }
    });

    socket.on('syncAllowedPlayer', (player) => {
      applyPermissionUI(player);
    });

    socket.on('listenSoundboard', (soundName) => {
      if (soundName) playSoundboardEvent(soundName);
    });

    socket.on('listenStopSound', () => {
      for (let key in soundboard) {
        try {
          soundboard[key].pause();
          soundboard[key].currentTime = 0;
        } catch (err) { }
      }
    });

    socket.on('syncPointerState', (pointerState) => {
      if (pointerState) {
        const p1 = document.getElementById('pointer1');
        const p2 = document.getElementById('pointer2');
        const p3 = document.getElementById('pointer3');
        const p4 = document.getElementById('pointer4');

        // Thêm điều kiện if để tránh lỗi Javascript khi DOM chưa kịp load
        if (p1) p1.style.display = pointerState.p1 ? 'block' : 'none';
        if (p2) p2.style.display = pointerState.p2 ? 'block' : 'none';
        if (p3) p3.style.display = pointerState.p3 ? 'block' : 'none';
        if (p4) p4.style.display = pointerState.p4 ? 'block' : 'none';
      }
    });

    // CHỈNH SỬA TẠI ĐÂY: Áp dụng crop khi khởi tạo hoặc tải lại trang giữa trận đấu
    socket.on('initGameState', (state) => {
      if (state) {
        if (state.spinMusic && spinSound) {
          spinSound.src = state.spinMusic;
        }

        if (state.activeImage && wheel) {
          wheel.src = state.activeImage;
          applyWheelCropStyle(state.activeImage);
        }

        // Đã dời đoạn này lên đúng vị trí ngay sau khi xử lý vòng quay
        if (state.pointerState) {
          const p1 = document.getElementById('pointer1');
          const p2 = document.getElementById('pointer2');
          const p3 = document.getElementById('pointer3');
          const p4 = document.getElementById('pointer4');

          if (p1) p1.style.display = state.pointerState.p1 ? 'block' : 'none';
          if (p2) p2.style.display = state.pointerState.p2 ? 'block' : 'none';
          if (p3) p3.style.display = state.pointerState.p3 ? 'block' : 'none';
          if (p4) p4.style.display = state.pointerState.p4 ? 'block' : 'none';
        }

        if (state.spinStartTime && state.spinStartTime > 0) {
          baseRotation = state.baseRotation;
          initVelocity = state.initVelocity;
          isSpinningFree = true;

          if (state.targetSeconds) {
            targetSeconds = state.targetSeconds;
          }

          let serverElapsed = state.serverNow - state.serverSpinStartTime;
          if (serverElapsed < 0 || !serverElapsed) serverElapsed = 0;

          spinStartTime = getServerTime() - serverElapsed;
          triggerSpinSoundTimeout();

          physicsWorker.postMessage({
            type: 'START_PHYSICS',
            baseRotation: baseRotation,
            initVelocity: initVelocity,
            spinStartTime: spinStartTime,
            targetSeconds: targetSeconds
          });
        } else {
          if (state.rotation !== undefined) {
            currentRotation = state.rotation;
            isSpinningFree = false;
            spinStartTime = 0;
            stopSpinSoundSafely();
            physicsWorker.postMessage({ type: 'SYNC_STATIC', rotation: currentRotation });
          }
        }

        if (state.pointerColorState) {
          for (let pId in state.pointerColorState) {
            const targetPointerDiv = document.getElementById(pId === 'p2' ? 'pointer2' : pId === 'p3' ? 'pointer3' : 'pointer4');
            if (targetPointerDiv) {
              const imgEl = targetPointerDiv.querySelector('img');
              if (imgEl) {
                if (state.pointerColorState[pId] === 'purple') {
                  imgEl.src = 'pointer4.png';
                } else {
                  imgEl.src = defaultPointerImages[pId];
                }
              }
            }
          }
        }
      }
    });

    socket.on('syncSpinMusic', (musicFile) => {
      if (musicFile && spinSound) {
        spinSound.src = musicFile;
      }
    });

    // Hàm dùng chung để render Thẻ đúng kích thước và vị trí
    function renderSlot(data) {
      const container = document.getElementById('slots-container');
      if (!container) return;

      const oldElement = document.getElementById(`slot_element_${data.id}`);
      if (oldElement) oldElement.remove();

      if (data.action === 'show') {
        const wrapper = document.createElement('div');
        wrapper.id = `slot_element_${data.id}`;

        wrapper.style.position = 'absolute';
        wrapper.style.width = '820px';
        wrapper.style.height = '820px';
        wrapper.style.transform = `rotate(${data.angle}deg)`;
        wrapper.style.zIndex = '12';
        wrapper.style.pointerEvents = 'none';

        const imgEl = document.createElement('img');
        imgEl.src = data.file;

        imgEl.style.position = 'absolute';
        imgEl.style.left = '410px';
        imgEl.style.transform = 'translateX(-50%)';

        const isCardCheck = data.isCard || (data.id && data.id.startsWith('t_'));

        if (isCardCheck) {
          // KHÔNG dùng object-fit để tránh ảnh tự căn giữa khung
          imgEl.style.objectFit = 'fill';
          // Đẩy sát lên Rìa nón (cách mép ngoài cùng của nón 820px chỉ 10px - 15px)
          imgEl.style.top = '75px';
          imgEl.style.width = '60px';
          imgEl.style.height = '80px';
        } else {
          // Giữ nguyên cấu hình chuẩn của các Ô
          imgEl.style.objectFit = 'contain';
          const isGroup2 = ['o3000', 'o4000', 'oqd'].includes(data.id) || data.id.endsWith('2') || data.id.endsWith('_2');
          if (isGroup2) {
            imgEl.style.top = '60px';
            imgEl.style.width = '120px';
            imgEl.style.height = '370px';
          } else {
            imgEl.style.top = '0px';
            imgEl.style.width = '100px';
            imgEl.style.height = '330px';
          }
        }

        wrapper.appendChild(imgEl);
        container.appendChild(wrapper);
      }
    }

    socket.on('syncPointerColorState', (data) => {
      if (data && data.pointerId) {
        const targetPointerDiv = document.getElementById(data.pointerId === 'p2' ? 'pointer2' : data.pointerId === 'p3' ? 'pointer3' : 'pointer4');
        if (targetPointerDiv) {
          const imgEl = targetPointerDiv.querySelector('img');
          if (imgEl) {
            if (data.colorState === 'purple') {
              imgEl.src = 'pointer4.png';
            } else {
              imgEl.src = defaultPointerImages[data.pointerId];
            }
          }
        }
      }
    });

    // Lắng nghe lệnh trực tiếp từ Tech
    socket.on('syncSlotState', (data) => {
      renderSlot(data);
    });
    
    function validateSpinDuration(input) {
      let val = parseInt(input.value);
      if (isNaN(val) || val < 15) val = 15;
      if (val > 25) val = 25;
      input.value = val;
    }

    // Hàm kích hoạt lệnh quay tự động từ nút bấm, đồng bộ phân phối toàn cầu
    function executeTriggerSpinButton() {
      if (!isDraggingAllowed || isSpinningFree) return;

      const durationInput = document.getElementById('spinDurationInput');
      const duration = parseInt(durationInput.value) || 20;

      const targetSeconds = duration;
      const totalTicks = targetSeconds * 60;

      const randomDegrees = 1800 + Math.random() * 3600;
      const calculatedVelocity = (randomDegrees * (1 - 0.995) * 60) / (1 - Math.pow(0.995, totalTicks));

      const startRotation = currentRotation;
      const startTime = getServerTime();

      isDraggingByMe = true;
      spinStartTime = startTime;
      baseRotation = startRotation;
      initVelocity = calculatedVelocity;
      isSpinningFree = true;

      triggerSpinSoundTimeout();
      refreshSpinButtonUI(); // Khóa ngay lập tức nút bấm tại local máy player

      socket.emit('playerUpdatePhysics', {
        baseRotation: baseRotation,
        initVelocity: initVelocity,
        spinStartTime: spinStartTime,
        rotation: baseRotation,
        targetSeconds: targetSeconds
      });

      physicsWorker.postMessage({
        type: 'START_PHYSICS',
        baseRotation: baseRotation,
        initVelocity: initVelocity,
        spinStartTime: spinStartTime,
        targetSeconds: targetSeconds
      });
    }

    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (e.keyCode === 123) e.preventDefault();
      if ((e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
        e.preventDefault();
      }
    });
  </script>
</body>
