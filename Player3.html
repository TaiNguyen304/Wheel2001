<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vòng Quay Thí Sinh - Player 1</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-weight: bold !important;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: url('bg.png') no-repeat center center/120% auto;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }

    .app {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .wheel-container {
      position: relative;
      width: 820px;
      height: 820px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #wheel {
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
      filter: drop-shadow(0 0 30px rgba(0, 0, 0, 0.5));
      will-change: transform;
      transform: translateZ(0);
    }

    .pointer-wrapper {
      position: absolute;
      bottom: -80px;
      left: 50%;
      width: 90px;
      height: 90px;
      transform: translateX(-50%);
      z-index: 5;
      pointer-events: none;
      user-select: none;
    }

    .pointer {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform: rotate(180deg);
      transform-origin: center top;
      will-change: transform;
    }

    .drag-zone {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      z-index: 10;
      cursor: not-allowed;
    }

    .audio-init-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .audio-init-overlay button {
      background: #ff00ff;
      color: white;
      border: none;
      padding: 25px 50px;
      font-size: 24px;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 0 25px #39ff14;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.4/dist/socket.io.min.js"></script>
</head>

<body>

  <div id="audioOverlay" class="audio-init-overlay">
    <button onclick="activateAudioStream()">KÍCH HOẠT KẾT NỐI REALTIME & ÂM THANH</button>
  </div>

  <div class="app">
    <div class="wheel-container">
      <div class="pointer-wrapper">
        <img id="pointerImg" class="pointer" src="pointer.png" />
      </div>
      <img id="wheel" src="wheel-template.png" />
      <div class="drag-zone" id="dragZone"></div>
    </div>
  </div>

  <audio id="spinSound" src="spin.mp3" preload="auto" loop></audio>

  <script>
    const socket = io("https://wheel2001.onrender.com");

    const roomid = sessionStorage.getItem('roomid');
    const playerRole = sessionStorage.getItem('player');
    const playerPass = sessionStorage.getItem('password');

    const myPlayerName = "Player 3";
    let isDraggingAllowed = false; 

    // FIX CHẶN TRUY CẬP: Sửa đúng tên sự kiện gửi lên server là 'playerVerifyLogin'
    if (!roomid || !playerRole) {
      window.location.href = 'index.html';
    } else {
      socket.emit('playerVerifyLogin', { roomid, playerRole, password: playerPass }, (res) => {
        if (!res || !res.success) {
          console.error("[AUTH] Xác thực thất bại hoặc phòng không tồn tại!");
          window.location.href = 'index.html';
        } else {
          console.log("[AUTH] Thiết lập kết nối phòng thành công!");
        }
      });
    }

    const wheel = document.getElementById('wheel');
    const pointerImg = document.getElementById('pointerImg'); // Sửa lại ID trỏ chuẩn

    // Quản lý hệ thống âm thanh cục bộ
    const clickSound = new Audio('click.mp3');
    const soundboard_goc = new Audio('goc.mp3');
    const soundboard_matluot = new Audio('matluot.mp3');
    const soundboard_mayman = new Audio('mayman.mp3');
    const soundboard_nhacnen = new Audio('nhacnen.mp3');
    const soundboard_chia_doi = new Audio('chia_doi.mp3');
    const soundboard_nhan_doi = new Audio('nhan_doi.mp3');
    const soundboard_vỗ_tay = new Audio('vỗ_tay.mp3');

    function activateAudioStream() {
      document.getElementById('audioOverlay').style.display = 'none';
      // Phát và dừng thử để kích hoạt AudioContext trên trình duyệt
      clickSound.play().then(() => { clickSound.pause(); }).catch(e => console.log(e));
    }

    function playSoundboardEvent(soundName) {
      try {
        if (soundName === 'goc') { soundboard_goc.currentTime = 0; soundboard_goc.play(); }
        else if (soundName === 'matluot') { soundboard_matluot.currentTime = 0; soundboard_matluot.play(); }
        else if (soundName === 'mayman') { soundboard_mayman.currentTime = 0; soundboard_mayman.play(); }
        else if (soundName === 'nhacnen') { soundboard_nhacnen.currentTime = 0; soundboard_nhacnen.play(); }
        else if (soundName === 'chia_doi') { soundboard_chia_doi.currentTime = 0; soundboard_chia_doi.play(); }
        else if (soundName === 'nhan_doi') { soundboard_nhan_doi.currentTime = 0; soundboard_nhan_doi.play(); }
        else if (soundName === 'vỗ_tay') { soundboard_vỗ_tay.currentTime = 0; soundboard_vỗ_tay.play(); }
      } catch (err) {
        console.error("Lỗi phát âm thanh bảng Tech:", err);
      }
    }

    let currentRotation = 0;
    let isDragging = false;
    let startAngle = 0;
    let currentAngle = 0;

    let dragHistory = [];
    let isDraggingByMe = false;

    let baseRotation = 0;
    let initVelocity = 0;
    let spinStartTime = 0;
    let isSpinningFree = false;

    const friction = 0.988;
    const pinAngleStep = 15;
    let lastClickAngleIndex = 0;
    let isSoundPlaying = false;

    function getMouseAngle(e) {
      const rect = wheel.getBoundingClientRect();
      const wheelX = rect.left + rect.width / 2;
      const wheelY = rect.top + rect.height / 2;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return Math.atan2(clientY - wheelY, clientX - wheelX) * (180 / Math.PI);
    }

    function applyPermissionUI(allowedPlayer) {
      const dragZone = document.getElementById('dragZone');
      if (allowedPlayer === myPlayerName) {
        isDraggingAllowed = true;
        if(dragZone) dragZone.style.cursor = 'grab';
        console.log("%c[QUYỀN QUAY] Bạn ĐÃ ĐƯỢC TECH MỞ QUYỀN QUAY NÓN!", "color: green; font-size: 14px; font-weight: bold;");
      } else {
        isDraggingAllowed = false;
        if(dragZone) dragZone.style.cursor = 'not-allowed';
        console.log(`%c[QUYỀN QUAY] Bị khóa. Lượt quay hiện tại thuộc về: ${allowedPlayer}`, "color: red;");
      }
    }

    function onMouseDown(e) {
      if (!isDraggingAllowed) return;
      if (isSpinningFree) return;
      isDragging = true;
      isDraggingByMe = true;
      startAngle = getMouseAngle(e);
      currentAngle = startAngle;
      dragHistory = [{ angle: startAngle, time: performance.now() }];
      spinStartTime = 0;
      initVelocity = 0;

      socket.emit('playerUpdatePhysics', {
        rotation: currentRotation,
        velocity: 0,
        isDraggingSync: true
      });
    }

    function onMouseMove(e) {
      if (!isDragging || !isDraggingByMe) return;
      const mouseAngle = getMouseAngle(e);
      const delta = mouseAngle - currentAngle;
      currentAngle = mouseAngle;

      let adjustedDelta = delta;
      if (delta > 180) adjustedDelta -= 360;
      if (delta < -180) adjustedDelta += 360;

      currentRotation += adjustedDelta;
      dragHistory.push({ angle: mouseAngle, time: performance.now() });
      if (dragHistory.length > 5) dragHistory.shift();

      socket.emit('playerUpdatePhysics', {
        rotation: currentRotation,
        velocity: 0,
        isDraggingSync: true
      });
    }

    function onMouseUp() {
      if (!isDragging || !isDraggingByMe) return;
      isDragging = false;

      if (dragHistory.length < 2) {
        isDraggingByMe = false;
        socket.emit('playerUpdatePhysics', { rotation: currentRotation, velocity: 0, isDraggingSync: false });
        return;
      }

      const now = performance.now();
      let validSample = null;
      for (let i = dragHistory.length - 1; i >= 0; i--) {
        if (now - dragHistory[i].time > 10 && now - dragHistory[i].time < 150) {
          validSample = dragHistory[i];
          break;
        }
      }
      if (!validSample) validSample = dragHistory[0];

      const dt = (now - validSample.time) / 1000;
      if (dt <= 0) {
        isDraggingByMe = false;
        socket.emit('playerUpdatePhysics', { rotation: currentRotation, velocity: 0, isDraggingSync: false });
        return;
      }

      let deltaAngle = currentAngle - validSample.angle;
      if (deltaAngle > 180) deltaAngle -= 360;
      if (deltaAngle < -180) deltaAngle += 360;

      let calculatedVelocity = deltaAngle / dt;
      const maxVel = 2500;
      if (calculatedVelocity > maxVel) calculatedVelocity = maxVel;
      if (calculatedVelocity < -maxVel) calculatedVelocity = -maxVel;

      if (Math.abs(calculatedVelocity) > 40) {
        baseRotation = currentRotation;
        initVelocity = calculatedVelocity;
        spinStartTime = performance.now();
        isSpinningFree = true;

        socket.emit('playerUpdatePhysics', {
          baseRotation: baseRotation,
          initVelocity: initVelocity,
          spinStartTime: spinStartTime
        });
      } else {
        isDraggingByMe = false;
        socket.emit('playerUpdatePhysics', { rotation: currentRotation, velocity: 0, isDraggingSync: false });
      }
    }

    window.addEventListener('mousedown', onMouseDown);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    window.addEventListener('touchstart', onMouseDown, { passive: false });
    window.addEventListener('touchmove', onMouseMove, { passive: false });
    window.addEventListener('touchend', onMouseUp);

    socket.on('playerSyncPhysics', (data) => {
      if (isDraggingByMe) return;

      if (data.spinStartTime) {
        baseRotation = data.baseRotation;
        initVelocity = data.initVelocity;
        spinStartTime = data.spinStartTime;
        isSpinningFree = true;
      } else {
        if (data.rotation !== undefined) currentRotation = data.rotation;
        if (data.velocity === 0) {
          isSpinningFree = false;
          spinStartTime = 0;
          initVelocity = 0;
        }
      }
    });

    function calculateCurrentPhysics() {
      if (!isSpinningFree) {
        return { r: currentRotation, v: 0 };
      }
      const t = (performance.now() - spinStartTime) / 1000;
      if (t < 0) return { r: baseRotation, v: initVelocity };

      const currentVelocity = initVelocity * Math.pow(friction, t * 60);
      if (Math.abs(currentVelocity) < 0.2) {
        isSpinningFree = false;
        const finalRotation = baseRotation + (initVelocity * (1 - Math.pow(friction, t * 60))) / (1 - friction) / 60;
        return { r: finalRotation, v: 0 };
      }

      const computedRotation = baseRotation + (initVelocity * (1 - Math.pow(friction, t * 60))) / (1 - friction) / 60;
      return { r: computedRotation, v: currentVelocity };
    }

    function manageSoundSafelyBackground() {
      let normalizedRotation = currentRotation % 360;
      if (normalizedRotation < 0) normalizedRotation += 360;
      let currentAngleIndex = Math.floor(normalizedRotation / pinAngleStep);

      if (currentAngleIndex !== lastClickAngleIndex) {
        lastClickAngleIndex = currentAngleIndex;
        if (!isSoundPlaying) {
          isSoundPlaying = true;
          clickSound.currentTime = 0;
          clickSound.play().then(() => {
            isSoundPlaying = false;
          }).catch(() => {
            isSoundPlaying = false;
          });
        }
      }
    }
    setInterval(manageSoundSafelyBackground, 30);

    function updatePointerFlap(rotationValue) {
      let normalizedRotation = rotationValue % 360;
      if (normalizedRotation < 0) normalizedRotation += 360;
      let remainder = normalizedRotation % pinAngleStep;
      if (remainder > pinAngleStep / 2) remainder -= pinAngleStep;

      let pointerAngleOffset = 0;
      const contactZone = 6;
      if (Math.abs(remainder) < contactZone) {
        let pushIntensity = (contactZone - Math.abs(remainder)) / contactZone;
        pointerAngleOffset = -Math.abs(remainder * pushIntensity * 6.0);
      }
      pointerAngleOffset = Math.max(-25, Math.min(0, pointerAngleOffset));
      if(pointerImg) pointerImg.style.transform = `rotate(${180 + pointerAngleOffset}deg)`;
    }

    function renderLoop() {
      const state = calculateCurrentPhysics();
      if (isSpinningFree) currentRotation = state.r;

      if(wheel) wheel.style.transform = `rotate(${currentRotation.toFixed(2)}deg) translateZ(0)`;
      updatePointerFlap(currentRotation);

      if (isDraggingByMe && isSpinningFree === false && state.v === 0 && !isDragging) {
        isDraggingByMe = false;
        spinStartTime = 0;
        isSoundPlaying = false;
        socket.emit('playerStopWheel', { rotation: currentRotation });
      }
      requestAnimationFrame(renderLoop);
    }
    requestAnimationFrame(renderLoop);

    socket.on('playerUpdateImage', (imageName) => {
      if (imageName && wheel) {
        wheel.src = imageName;
      }
    });

    socket.on('syncAllowedPlayer', (player) => {
      applyPermissionUI(player);
    });

    socket.on('listenSoundboard', (soundName) => {
      if (soundName) playSoundboardEvent(soundName);
    });

    socket.on('initGameState', (state) => {
      if (state) {
        if (state.activeImage && wheel) wheel.src = state.activeImage;
        applyPermissionUI(state.allowedPlayer);
      }
    });

    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (e.keyCode === 123) e.preventDefault();
      if ((e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
        e.preventDefault();
      }
    });
</script>
</body>

</html>
